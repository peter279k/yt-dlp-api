services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
  yt-dlp-api:
    build: .
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
  worker:
    build: .
    container_name: celery_worker
    command: celery -A app.workers.worker.celery worker --loglevel=info
    depends_on:
      - rabbitmq
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx_config.conf:/etc/nginx/conf.d/default.conf
      - ./web:/usr/share/nginx/html
    depends_on:
      - rabbitmq
      - worker
      - yt-dlp-api
    restart: always
